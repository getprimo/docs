name: i18n sync

on:
  push:
    branches:
      - main
    paths:
      - "**/*.mdx"
      - "docs.json"
      - "i18n/**"
      - "scripts/i18n_sync.py"
      - ".github/workflows/i18n-sync.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed English sources
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          changed=$(git diff --name-only "$before" "$after" -- '*.mdx' 'docs.json' \
            ':!fr/**' ':!de/**' ':!es/**' ':!it/**')

          if [ -z "$changed" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_changes=true"
            echo "files<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync translations
        if: steps.changes.outputs.has_changes == 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          engine="google"
          if [ -n "${DEEPL_API_KEY}" ]; then
            engine="deepl"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 scripts/i18n_sync.py --engine "$engine"
            exit 0
          fi

          mapfile -t files < <(printf '%s\n' "${{ steps.changes.outputs.files }}")
          python3 scripts/i18n_sync.py --engine "$engine" --files "${files[@]}"

      - name: Set up Node.js
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Mintlify CLI
        if: steps.changes.outputs.has_changes == 'true'
        run: npm install -g mint

      - name: Validate internal links
        if: steps.changes.outputs.has_changes == 'true'
        run: mint broken-links

      - name: Create translation pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/i18n-sync
          commit-message: "chore(i18n): sync localized docs"
          title: "chore(i18n): sync localized docs"
          body: |
            ## Summary

            - sync translated MDX files from English source content
            - update `i18n/translation-manifest.json`
            - validate links with `mint broken-links`

            ## Review notes

            - this PR is generated automatically
            - review terminology, UI labels, and complex MDX pages before merge
          labels: |
            documentation
            i18n
